<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="utf-8">
  <title>pi-TUI В· status bar variations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Standalone preview: no bundler wrapper, so GitHub HTML previewers can render it reliably. -->
  <style>
    /* в”Ђв”Ђ page chrome в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #1a1916;
      color: #E8E3D9;
      min-height: 100vh;
      padding: 56px 40px 80px;
      -webkit-font-smoothing: antialiased;
    }
    .page-h {
      max-width: 980px;
      margin: 0 auto 48px;
    }
    .page-h h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 40px;
      letter-spacing: -0.01em;
      margin: 0 0 8px;
      color: #ECE7DC;
    }
    .page-h .sub {
      color: #9A9385;
      font-size: 15px;
      max-width: 60ch;
      text-wrap: pretty;
    }

    .theme-switch {
      max-width: 980px;
      margin: 0 auto 28px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: #9A9385;
    }
    .theme-switch button {
      font: inherit;
      background: transparent;
      color: #B0A99A;
      border: 1px solid rgba(236,231,220,0.18);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 200ms, color 200ms, border-color 200ms;
    }
    .theme-switch button:hover { background: rgba(236,231,220,0.06); color: #ECE7DC; }
    .theme-switch button[aria-pressed="true"] {
      background: rgba(216,155,126,0.15);
      color: #D89B7E;
      border-color: rgba(216,155,126,0.4);
    }

    .grid {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 36px;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card .label {
      display: flex;
      align-items: baseline;
      gap: 10px;
      color: #9A9385;
      font-size: 13px;
    }
    .card .label .n {
      font-family: 'JetBrains Mono', monospace;
      color: #D89B7E;
      font-weight: 500;
    }
    .card .label .name {
      color: #ECE7DC;
      font-weight: 500;
    }
    .card .label .note {
      color: #777768;
      font-size: 12px;
    }

    /* в”Ђв”Ђ tui surface в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .tui-screen {
      /* paper (default) */
      --tui-bg: #EFE7D4;
      --tui-bg-edge: #E5DBC2;
      --tui-ink: #1D1916;
      --tui-ink-2: #5B524A;
      --tui-ink-3: #8C8175;
      --tui-rule: rgba(29,25,22,0.18);
      --tui-red: #8C2A1F;
      --tui-red-bg: rgba(140,42,31,0.10);
      --tui-yellow: #8A6A1F;
      --tui-yellow-bg: rgba(138,106,31,0.12);
      --tui-green: #3F5C45;
      --tui-green-bg: rgba(63,92,69,0.12);
      --tui-blue: #2F5A78;
      --tui-blue-bg: rgba(47,90,120,0.10);
      --tui-purple: #6E4A78;
      --tui-cursor: #8C2A1F;
      --tui-selection: rgba(140,42,31,0.18);
      --tui-paper-tex: 0.6;

      background: var(--tui-bg);
      color: var(--tui-ink);
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      line-height: 1.55;
      border-radius: 4px;
      padding: 22px 24px;
      white-space: pre;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      box-shadow:
        0 1px 0 rgba(0,0,0,0.4),
        0 12px 28px rgba(0,0,0,0.35);
    }
    .tui-screen::before {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 17% 23%, rgba(0,0,0,0.030) 0.5px, transparent 1px),
        radial-gradient(circle at 71% 41%, rgba(0,0,0,0.022) 0.5px, transparent 1px),
        radial-gradient(circle at 41% 73%, rgba(0,0,0,0.020) 0.5px, transparent 1px),
        radial-gradient(circle at 89% 89%, rgba(0,0,0,0.025) 0.5px, transparent 1px);
      background-size: 7px 7px, 11px 11px, 13px 13px, 19px 19px;
      opacity: var(--tui-paper-tex);
    }
    .tui-screen::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 0;
      box-shadow:
        inset 0 0 80px rgba(29,25,22,0.06),
        inset 0 0 0 1px rgba(29,25,22,0.05);
    }
    .tui-screen > * { position: relative; z-index: 1; }

    body[data-theme="dark"] .tui-screen {
      --tui-bg: #2E322E;
      --tui-bg-edge: #272A27;
      --tui-ink: #ECE7DC;
      --tui-ink-2: #B0B0A5;
      --tui-ink-3: #777768;
      --tui-rule: rgba(236,231,220,0.18);
      --tui-red: #D89B7E;
      --tui-red-bg: rgba(216,155,126,0.14);
      --tui-yellow: #D9B670;
      --tui-yellow-bg: rgba(217,182,112,0.16);
      --tui-green: #ADC79A;
      --tui-green-bg: rgba(173,199,154,0.14);
      --tui-blue: #8FB4CE;
      --tui-blue-bg: rgba(143,180,206,0.12);
      --tui-purple: #BCA0C5;
      --tui-cursor: #D89B7E;
      --tui-selection: rgba(216,155,126,0.20);
      --tui-paper-tex: 0;
    }
    body[data-theme="dark"] .tui-screen::before { display: none; }

    body[data-theme="light"] .tui-screen {
      --tui-bg: #F5F1EA;
      --tui-bg-edge: #ECE7DC;
      --tui-ink: #2A2D28;
      --tui-ink-2: #6B6B60;
      --tui-ink-3: #9A9A8E;
      --tui-rule: rgba(42,45,40,0.14);
      --tui-red: #A8734F;
      --tui-yellow: #A88A50;
      --tui-green: #6F8A68;
      --tui-blue: #5F8880;
      --tui-purple: #8A6E9C;
      --tui-cursor: #A8734F;
      --tui-selection: rgba(168,115,79,0.16);
      --tui-paper-tex: 0;
    }
    body[data-theme="light"] .tui-screen::before { display: none; }

    .tui-line { display: block; white-space: pre; font-feature-settings: 'liga' 0, 'calt' 0; }

    .tui-red { color: var(--tui-red); }
    .tui-yel { color: var(--tui-yellow); }
    .tui-grn { color: var(--tui-green); }
    .tui-blu { color: var(--tui-blue); }
    .tui-pur { color: var(--tui-purple); }
    .tui-dim { color: var(--tui-ink-2); }
    .tui-faint { color: var(--tui-ink-3); }
    .tui-bold { font-weight: 700; }
    .tui-italic { font-style: italic; }

    .tui-fill-red { background: var(--tui-red-bg); color: var(--tui-red); }
    .tui-fill-yel { background: var(--tui-yellow-bg); color: var(--tui-yellow); }
    .tui-fill-grn { background: var(--tui-green-bg); color: var(--tui-green); }
    .tui-fill-blu { background: var(--tui-blue-bg); color: var(--tui-blue); }
    .tui-fill-dim { background: rgba(0,0,0,0.05); }

    .tui-cursor {
      display: inline-block;
      width: 1ch;
      background: var(--tui-cursor);
      color: var(--tui-cursor);
      animation: tui-blink 1.0s steps(2) infinite;
    }
    .tui-cursor::before { content: 'в–€'; }
    @keyframes tui-blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0.18; }
    }
  </style>
</head>

<body data-theme="dark">

  <div class="page-h">
    <h1>Status bar &amp; input вЂ” variations</h1>
    <p class="sub">Eight takes on the bottom strip of pi-TUI. Each shows the current path, the active model and its reasoning strength, and (when in a git repo) the branch with change counts.</p>
  </div>

  <div class="theme-switch">
    <span>theme&nbsp;В·&nbsp;</span>
    <button data-theme-btn="paper">paper</button>
    <button data-theme-btn="dark" aria-pressed="true">dark</button>
    <button data-theme-btn="light">light</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
  // в”Ђв”Ђ parser в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  // Same В«clsВ»вЂ¦В«/В» marker convention as the main project.
  function tuiRender(line) {
    const out = [];
    const stack = [];
    let buf = '';
    let i = 0;
    const flush = () => {
      if (!buf) return;
      const text = escapeHtml(buf);
      if (stack.length) {
        const cls = stack.map(mapClass).join(' ');
        out.push(`<span class="${cls}">${text}</span>`);
      } else {
        out.push(text);
      }
      buf = '';
    };
    while (i < line.length) {
      if (line[i] === 'В«' && line.charAt(i + 1) === '/' && line.charAt(i + 2) === 'В»') {
        flush();
        stack.pop();
        i += 3;
      } else if (line[i] === 'В«') {
        const close = line.indexOf('В»', i + 1);
        if (close === -1) { buf += line[i]; i++; continue; }
        flush();
        const tok = line.slice(i + 1, close);
        if (tok === 'cur') {
          out.push('<span class="tui-cursor"></span>');
        } else {
          stack.push(tok);
        }
        i = close + 1;
      } else {
        buf += line[i];
        i++;
      }
    }
    flush();
    return out.join('');
  }
  function escapeHtml(s) {
    return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }
  function mapClass(k) {
    return ({
      red:'tui-red', yel:'tui-yel', grn:'tui-grn', blu:'tui-blu', pur:'tui-pur',
      dim:'tui-dim', faint:'tui-faint', b:'tui-bold', it:'tui-italic',
      fred:'tui-fill-red', fyel:'tui-fill-yel', fgrn:'tui-fill-grn',
      fblu:'tui-fill-blu', fdim:'tui-fill-dim',
    }[k] || k);
  }
  function tuiLen(line) {
    return line.replace(/В«curВ»/g, ' ').replace(/В«[^В»]*В»/g, '').length;
  }
  function tuiPad(line, width, fill = ' ') {
    const n = tuiLen(line);
    if (n >= width) return line;
    return line + fill.repeat(width - n);
  }
  function lr(left, right, W, fill = ' ') {
    const gap = W - tuiLen(left) - tuiLen(right);
    return left + fill.repeat(Math.max(1, gap)) + right;
  }

  // в”Ђв”Ђ shared data в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const PATH      = '~/projects/sage-app';
  const PATH_LONG = 'вЂ¦/sage-app/src/components';
  const MODEL     = 'gpt-5.5';
  const STRENGTH  = 'xhigh';
  const BRANCH    = 'feat/picker-ctx';
  const GIT_MOD   = 3;
  const GIT_UNT   = 1;
  const PROMPT    = 'В«red bВ»вЂєВ«/В»';
  const HINT      = 'В«faint itВ»message piвЂ¦В«/В»';
  const CUR       = 'В«curВ»';
  const HINTS     = 'В«dimВ»[/]В«/В»В«faintВ» cmds В«/В»В«faintВ»В·В«/В»В«dimВ» [@]В«/В»В«faintВ» files В«/В»В«faintВ»В·В«/В»В«dimВ» [вЏЋ]В«/В»В«faintВ» sendВ«/В»';

  // в”Ђв”Ђ variants в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  function v1_hairline() {
    const W = 92, L = [];
    L.push('В«faintВ»' + 'в”Ђ'.repeat(W) + 'В«/В»');
    L.push(' ' + PROMPT + '  ' + tuiPad('refactor the file picker to use a provider context' + CUR, W - 4));
    L.push('В«faintВ»' + 'в”Ђ'.repeat(W) + 'В«/В»');
    L.push('');
    const left  = `В«dimВ»${PATH}В«/В»  В«faintВ»В·В«/В»  В«grnВ»вЋ‡В«/В» В«bВ»${BRANCH}В«/В» В«yelВ»вњљ${GIT_MOD}В«/В» В«redВ»?${GIT_UNT}В«/В»`;
    const right = `В«faintВ»modelВ«/В» В«bВ»${MODEL}В«/В» В«faintВ»В·В«/В» В«yelВ»${STRENGTH}В«/В»`;
    L.push(' ' + lr(left, right + ' ', W - 1));
    return L;
  }

  function v2_chips() {
    const W = 92, L = [];
    L.push('в•­' + 'в”Ђ'.repeat(W - 2) + 'в•®');
    L.push('в”‚ ' + PROMPT + '  ' + tuiPad(HINT + CUR, W - 6) + ' в”‚');
    L.push('в”‚' + ' '.repeat(W - 2) + 'в”‚');
    const seg1 = ` В«dimВ»${PATH}В«/В» `;
    const seg2 = ` В«grnВ»вЋ‡В«/В» В«bВ»${BRANCH}В«/В» В«redВ»?${GIT_UNT}В«/В» В«yelВ»вњљ${GIT_MOD}В«/В» `;
    const seg3 = ` В«bВ»${MODEL}В«/В» В«faintВ»В·В«/В» В«yelВ»${STRENGTH}В«/В» `;
    const inner = 'в”Ђ' + seg1 + 'в”Ђ' + seg2 + 'в”Ђ';
    const tail  = 'в”Ђ' + seg3 + 'в”Ђ';
    const fill  = W - 2 - tuiLen(inner) - tuiLen(tail);
    L.push('в•°' + inner + 'в”Ђ'.repeat(Math.max(1, fill)) + tail + 'в•Ї');
    return L;
  }

  function v3_status_above() {
    const W = 92, L = [];
    const left  = `В«faintВ»inВ«/В» В«dimВ»${PATH}В«/В»   В«grnВ»вЋ‡В«/В» В«bВ»${BRANCH}В«/В» В«yelВ»вњљ${GIT_MOD}В«/В» В«redВ»?${GIT_UNT}В«/В»`;
    const right = `В«faintВ»usingВ«/В» В«bВ»${MODEL}В«/В» В«faintВ»В·В«/В» В«yelВ»${STRENGTH}В«/В»`;
    L.push('  ' + lr(left, right + '  ', W - 2));
    L.push('');
    L.push('  в•­' + 'в”Ђ'.repeat(W - 6) + 'в•®');
    L.push('  в”‚ ' + PROMPT + '  ' + tuiPad('refactor the file picker' + CUR, W - 10) + ' в”‚');
    L.push('  в•°' + 'в”Ђ'.repeat(W - 6) + 'в•Ї');
    L.push('  ' + tuiPad('', W - 2 - tuiLen(HINTS)) + HINTS);
    return L;
  }

  function v4_pills() {
    const W = 92, L = [];
    L.push('В«faintВ»' + 'в•ґ '.repeat(Math.floor(W / 2)) + 'В«/В»');
    L.push(' ' + PROMPT + '  ' + tuiPad(HINT + CUR, W - 4));
    L.push('В«faintВ»' + 'в•ґ '.repeat(Math.floor(W / 2)) + 'В«/В»');
    L.push('');
    const p1 = `В«fdimВ» ${PATH} В«/В»`;
    const p2 = `В«fgrnВ» вЋ‡ ${BRANCH} В«/В»` + ` В«fyelВ» вњљ${GIT_MOD} В«/В»` + ` В«fredВ» ?${GIT_UNT} В«/В»`;
    const p3 = `В«fredВ» ${MODEL} В«/В»` + ` В«fdimВ» ${STRENGTH} В«/В»`;
    L.push(' ' + lr(p1 + '  ' + p2, p3 + ' ', W - 1));
    return L;
  }

  function v5_corner_tabs() {
    const W = 92, L = [];
    const leftTab  = 'в”Ђ В«faintВ»chatВ«/В» ';
    const rightTab = ` В«bВ»${MODEL}В«/В» В«faintВ»В·В«/В» В«yelВ»${STRENGTH}В«/В» в”Ђ`;
    const topMid   = W - 2 - tuiLen(leftTab) - tuiLen(rightTab);
    L.push('в•­' + leftTab + 'в”Ђ'.repeat(topMid) + rightTab + 'в•®');
    L.push('в”‚' + ' '.repeat(W - 2) + 'в”‚');
    L.push('в”‚  ' + PROMPT + '  ' + tuiPad('refactor the file picker' + CUR, W - 8) + ' в”‚');
    L.push('в”‚' + ' '.repeat(W - 2) + 'в”‚');
    const lTab = `в”Ђ В«dimВ»${PATH}В«/В» `;
    const rTab = ` В«grnВ»вЋ‡В«/В» В«bВ»${BRANCH}В«/В» В«yelВ»вњљ${GIT_MOD}В«/В» В«redВ»?${GIT_UNT}В«/В» в”Ђ`;
    const botMid = W - 2 - tuiLen(lTab) - tuiLen(rTab);
    L.push('в•°' + lTab + 'в”Ђ'.repeat(botMid) + rTab + 'в•Ї');
    return L;
  }

  function v6_margin() {
    const W = 92, L = [];
    const MARGIN = 22;
    const FIELD  = W - MARGIN;
    const m = s => tuiPad(s, MARGIN);
    L.push(m('В«faintВ»pathВ«/В»') + 'В«faintВ»в•ґВ«/В»  ' + tuiPad(HINT + CUR, FIELD - 4));
    L.push(m(`В«dimВ»${PATH}В«/В»`) + 'В«faintВ»' + 'в”Ђ'.repeat(FIELD) + 'В«/В»');
    L.push('');
    L.push(m('В«faintВ»branchВ«/В»') + ' ');
    L.push(m(`В«grnВ»вЋ‡В«/В» В«bВ»${BRANCH}В«/В»  В«yelВ»вњљ${GIT_MOD}В«/В» В«redВ»?${GIT_UNT}В«/В»`) + ' ');
    L.push('');
    L.push(m('В«faintВ»modelВ«/В»') + tuiPad('', FIELD - tuiLen(HINTS) - 2) + HINTS);
    L.push(m(`В«bВ»${MODEL}В«/В» В«faintВ»В·В«/В» В«yelВ»${STRENGTH}В«/В»`) + ' ');
    return L;
  }

  function v7_dense() {
    const W = 92, L = [];
    const left  = `В«dimВ»${PATH_LONG}В«/В»  В«faintВ»в”‚В«/В»  В«grnВ»вЋ‡В«/В» В«bВ»${BRANCH}В«/В» В«yelВ»вњљ${GIT_MOD}В«/В» В«redВ»?${GIT_UNT}В«/В»`;
    const right = `В«bВ»${MODEL}В«/В» В«faintВ»В·В«/В» В«yelВ»${STRENGTH}В«/В»`;
    L.push(' ' + lr(left, right + ' ', W - 1));
    L.push('В«faintВ»' + 'в”Ђ'.repeat(W) + 'В«/В»');
    L.push(' ' + PROMPT + '  ' + tuiPad(HINT + CUR, W - 4));
    L.push(' ' + tuiPad('', W - 3 - tuiLen(HINTS)) + HINTS + ' ');
    return L;
  }

  function v8_badges() {
    const W = 92, L = [];
    L.push('  в•­' + 'в”Ђ'.repeat(W - 6) + 'в•®');
